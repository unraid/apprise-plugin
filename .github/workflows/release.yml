name: Validate Release

on:
  workflow_call:
    inputs:
      tag:
        description: 'Internal release tag, for example v0.1.0'
        required: true
        type: string
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Internal release tag, for example v0.1.0'
        required: true
        type: string

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Validate plugin metadata
        shell: bash
        env:
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail

          tag="${RELEASE_TAG}"

          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tags must use internal SemVer format, for example v0.1.0: $tag" >&2
            exit 1
          fi

          internal_version="${tag#v}"
          plugin_version="$(sed -n 's/^<!ENTITY pluginVersion[[:space:]]*"\([^"]*\)">$/\1/p' plugins/apprise.plg)"
          if [[ "$plugin_version" != "$internal_version" ]]; then
            echo "Tag $tag does not match PLG internal version $plugin_version" >&2
            exit 1
          fi

          release_tag="$(sed -n 's/^<!ENTITY releaseTag[[:space:]]*"\([^"]*\)">$/\1/p' plugins/apprise.plg)"
          if [[ "$release_tag" != "$tag" ]]; then
            echo "Tag $tag does not match PLG release tag $release_tag" >&2
            exit 1
          fi

          plg_version="$(sed -n 's/^<!ENTITY version[[:space:]]*"\([^"]*\)">$/\1/p' plugins/apprise.plg)"
          if [[ ! "$plg_version" =~ ^[0-9]{4}\.[0-9]{2}\.[0-9]{2}\.[0-9]{4}\.[0-9]+- ]]; then
            echo "PLG version must use external build format YYYY.MM.DD.HHMM.BUILD-${internal_version}: $plg_version" >&2
            exit 1
          fi
          if [[ "${plg_version#*-}" != "$internal_version" ]]; then
            echo "PLG version must end with exact internal version ${internal_version}: $plg_version" >&2
            exit 1
          fi

          python3 scripts/lint_plugin_metadata.py

          agent_md5="$(sed -n 's/^<!ENTITY agentMD5[[:space:]]*"\([^"]*\)">$/\1/p' plugins/apprise.plg)"
          actual_agent_md5="$(md5sum agents/Apprise.xml | awk '{print $1}')"
          if [[ "$agent_md5" != "$actual_agent_md5" ]]; then
            echo "Agent MD5 mismatch: PLG has $agent_md5, actual is $actual_agent_md5" >&2
            exit 1
          fi

          apprise_version="$(sed -n 's/^<!ENTITY appriseVersion[[:space:]]*"\([^"]*\)">$/\1/p' plugins/apprise.plg)"
          apprise_url="$(sed -n 's/^<!ENTITY appriseURL[[:space:]]*"\([^"]*\)">$/\1/p' plugins/apprise.plg)"
          apprise_url="${apprise_url//&appriseVersion;/$apprise_version}"
          apprise_md5="$(sed -n 's/^<!ENTITY appriseMD5[[:space:]]*"\([^"]*\)">$/\1/p' plugins/apprise.plg)"
          curl -fsSL "$apprise_url" -o /tmp/apprise-go-linux-amd64
          actual_apprise_md5="$(md5sum /tmp/apprise-go-linux-amd64 | awk '{print $1}')"
          if [[ "$apprise_md5" != "$actual_apprise_md5" ]]; then
            echo "apprise-go MD5 mismatch: PLG has $apprise_md5, actual is $actual_apprise_md5" >&2
            exit 1
          fi

          apprise_notice_base_url="https://raw.githubusercontent.com/unraid/apprise-go/${apprise_version}"
          apprise_license_md5="$(sed -n 's/^<!ENTITY appriseLicenseMD5[[:space:]]*"\([^"]*\)">$/\1/p' plugins/apprise.plg)"
          curl -fsSL "${apprise_notice_base_url}/LICENSE" -o /tmp/apprise-go-LICENSE
          actual_apprise_license_md5="$(md5sum /tmp/apprise-go-LICENSE | awk '{print $1}')"
          if [[ "$apprise_license_md5" != "$actual_apprise_license_md5" ]]; then
            echo "apprise-go LICENSE MD5 mismatch: PLG has $apprise_license_md5, actual is $actual_apprise_license_md5" >&2
            exit 1
          fi

          apprise_notice_md5="$(sed -n 's/^<!ENTITY appriseNoticeMD5[[:space:]]*"\([^"]*\)">$/\1/p' plugins/apprise.plg)"
          curl -fsSL "${apprise_notice_base_url}/NOTICE.md" -o /tmp/apprise-go-NOTICE.md
          actual_apprise_notice_md5="$(md5sum /tmp/apprise-go-NOTICE.md | awk '{print $1}')"
          if [[ "$apprise_notice_md5" != "$actual_apprise_notice_md5" ]]; then
            echo "apprise-go NOTICE MD5 mismatch: PLG has $apprise_notice_md5, actual is $actual_apprise_notice_md5" >&2
            exit 1
          fi

          icon_url="$(sed -n 's/^<!ENTITY iconURL[[:space:]]*"\([^"]*\)">$/\1/p' plugins/apprise.plg)"
          icon_url="${icon_url//&appriseRepoURL;/https://raw.githubusercontent.com/unraid/apprise-go/${apprise_version}}"
          icon_url="${icon_url//&appriseVersion;/$apprise_version}"
          icon_md5="$(sed -n 's/^<!ENTITY iconMD5[[:space:]]*"\([^"]*\)">$/\1/p' plugins/apprise.plg)"
          curl -fsSL "$icon_url" -o /tmp/apprise.png
          actual_icon_md5="$(md5sum /tmp/apprise.png | awk '{print $1}')"
          if [[ "$icon_md5" != "$actual_icon_md5" ]]; then
            echo "Icon MD5 mismatch: PLG has $icon_md5, actual is $actual_icon_md5" >&2
            exit 1
          fi

          readme_md5="$(sed -n 's/^<!ENTITY readmeMD5[[:space:]]*"\([^"]*\)">$/\1/p' plugins/apprise.plg)"
          actual_readme_md5="$(md5sum plugin/README.md | awk '{print $1}')"
          if [[ "$readme_md5" != "$actual_readme_md5" ]]; then
            echo "README MD5 mismatch: PLG has $readme_md5, actual is $actual_readme_md5" >&2
            exit 1
          fi

          {
            echo "tag=$tag"
            echo "internal_version=$internal_version"
            echo "plg_version=$plg_version"
          } >> "$GITHUB_ENV"
