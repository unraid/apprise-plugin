[package]
changelog = "CHANGELOG.md"
versioned_files = [
  { path = "VERSION", regex = "(?m)^(?<version>[^\\n]+)$" },
  { path = "plugins/apprise.plg", regex = '<!ENTITY pluginVersion[[:space:]]+"(?<version>[^"]+)">' }
]

[[workflows]]
name = "prepare-release"

[[workflows.steps]]
type = "Command"
command = "git switch -C knope/release"

[[workflows.steps]]
type = "PrepareRelease"

[[workflows.steps]]
type = "Command"
command = "python3 scripts/prepare_plugin_release.py --internal-version \"$(cat VERSION)\""

[[workflows.steps]]
type = "Command"
command = "git add plugins/apprise.plg"

[[workflows.steps]]
type = "Command"
command = 'git commit -m "chore: prepare release $(cat VERSION)"'

[[workflows.steps]]
type = "Command"
command = "git push --force --set-upstream origin knope/release"

[[workflows.steps]]
type = "CreatePullRequest"
base = "main"

[workflows.steps.title]
template = "chore: prepare release $version"

[workflows.steps.body]
template = "This PR was created by Knope. Merging it will publish the release.\n\n$changelog"

[[workflows]]
name = "release"

[[workflows.steps]]
type = "Release"

[[workflows]]
name = "document-change"

[[workflows.steps]]
type = "CreateChangeFile"

[github]
owner = "unraid"
repo = "apprise-plugin"
