[packages."unraid-apprise-plugin"]
changelog = "CHANGELOG.md"
versioned_files = [
  { path = "VERSION", regex = "(?m)^(?<version>[^\\n]+)$" },
  { path = "plugins/apprise.plg", regex = '<!ENTITY pluginVersion[[:space:]]+"(?<version>[^"]+)">' }
]

[[workflows]]
name = "release"

[[workflows.steps]]
type = "PrepareRelease"

[[workflows.steps]]
type = "Command"
command = "python3 scripts/prepare_plugin_release.py --internal-version \"$(cat VERSION)\""

[[workflows.steps]]
type = "Command"
command = 'git commit -m "chore: prepare release $(cat VERSION)"'

[[workflows.steps]]
type = "Release"

[[workflows.steps]]
type = "Command"
command = 'git tag "v$(cat VERSION)"'

[[workflows.steps]]
type = "Command"
command = "git push"

[[workflows.steps]]
type = "Command"
command = "git push --tags"

[[workflows]]
name = "document-change"

[[workflows.steps]]
type = "CreateChangeFile"
